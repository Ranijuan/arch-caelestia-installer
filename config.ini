# Configuración del Instalador Arch con Caelestia
# Personaliza estos valores según tus preferencias

[GENERAL]
# Nombre del instalador que se muestra en pantalla
nombre_aplicacion = "Instalador Arch Linux con Caelestia"

# Mostrar colores en la terminal (true/false)
usar_colores = true

# Mostrar emojis (true/false)
usar_emojis = true

# Velocidad de pausa entre pasos (en segundos)
# 0 = sin pausa, 1-5 = recomendado
tiempo_pausa = 2

[PASOS]
# Habilitar/deshabilitar pasos específicos
paso_verificar_conexion = true
paso_actualizar_sistema = true
paso_instalar_dependencias = true
paso_descargar_caelestia = true
paso_instalar_caelestia = true
paso_configurar_caelestia = true
paso_instalar_paquetes = true
paso_finalizar = true

[CONFIGURACION_POR_DEFECTO]
# Estas son las opciones por defecto si el usuario presiona ENTER sin escribir

# Entorno de escritorio por defecto (gnome, plasma, xfce, i3)
entorno_escritorio_default = gnome

# Idioma por defecto (es_ES, en_US, fr_FR)
idioma_default = es_ES

# Paquetes por defecto (true/false para cada opción)
instalar_navegador_default = true
instalar_oficina_default = false
instalar_multimedia_default = false
instalar_desarrollo_default = false

[URLS]
# URLs de descarga (en caso de que cambien en el futuro)
url_caelestia = "https://github.com/caelestia/caelestia.git"

[MENSAJES]
# Personaliza los mensajes mostrados

mensaje_bienvenida = "Bienvenido al Instalador Interactivo de Arch Linux con Caelestia"
mensaje_completado = "¡Instalación Completada con Éxito!"
mensaje_error = "Hubo un problema durante la instalación"
mensaje_cancelado = "Instalación cancelada por el usuario"

[DEBUG]
# Opciones para debugging/solución de problemas

# Mostrar comandos completos (true/false)
mostrar_comandos_completos = true

# Pausar en cada error (true/false)
pausar_en_errores = true

# Guardar log de la instalación (true/false)
guardar_log = true

# Archivo de log
archivo_log = "instalacion_arch.log"

# Modo verbose (más información)
modo_verbose = false
